# ML_Models/configs/catboost_config.yaml   --> Like a recipe card, can change ingredients without rebuil kitchen
experiment_name: "CatBoost_Experiment"
random_state: 42
val_size: 0.2
cv_folds: 3
track_path: "catboost_log.json"
save_path: "catboost_model.pkl"

data:
  file_path: "data/Jobs Data.xlsx"
  file_type: "excel"
  columns_needed:
    - "Job Number"
    - "Job Value"
    - "Total Claimed"
    - "Total Cost"
    - "Estimator"
    - "Foreman"
    - "Job Area"
    - "Main Contractor"
    - "Suburb"
    - "Supervisor"
    - "Job Description"
    - "Saving or Loss"
  target_column: "Saving or Loss"
  categorical_features:
    - "Estimator"
    - "Foreman"
    - "Job Area"
    - "Main Contractor"
    - "Suburb"
    - "Supervisor"
    - "Job Description"

feature_engineering:
  operations:
    - name: "temp_profit"
      operation: "subtract"
      inputs: ["Total Claimed", "Total Cost"]
      output: "Temp Profit"

  categorical_handling:
    fillna: "Unknown"
    encoding: "native"
    handle_missing: true # Add this

model:
  type: "catboost"
  task: "regression"
  params:
    loss_function: "RMSE"
    eval_metric: "RMSE"
    verbose: 0
  hyperparameter_search:
    enabled: true
    method: "randomized_search"
    n_iter: 5
    scoring: "neg_root_mean_squared_error"
    cv: 3
    param_distributions:
      depth: [5, 7, 9]
      learning_rate: [0.05, 0.1]
      iterations: [500, 1000]
