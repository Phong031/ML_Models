# ML_Models/configs/neuralnetwork_config.yaml
experiment_name: "NeuralNetwork_Experiment"
random_state: 42
val_size: 0.2
cv_folds: 3
track_path: "neuralnetwork_log.json"
save_path: "neuralnetwork_model.pkl"

data:
  file_path: "data/Jobs Data.xlsx"
  file_type: "excel"
  columns_needed:
    - "Job Number"
    - "Job Value"
    - "Total Claimed"
    - "Total Cost"
    - "Estimator"
    - "Foreman"
    - "Job Area"
    - "Main Contractor"
    - "Suburb"
    - "Supervisor"
    - "Job Description"
    - "Saving or Loss"
  target_column: "Saving or Loss"
  categorical_features:
    - "Estimator"
    - "Foreman"
    - "Job Area"
    - "Main Contractor"
    - "Suburb"
    - "Supervisor"
    - "Job Description"

feature_engineering:
  operations:
    - name: "temp_profit"
      operation: "subtract"
      inputs: ["Total Claimed", "Total Cost"]
      output: "Temp Profit"

  # 👇 NEW: Preprocessing settings for neural networks
  preprocessing:
    scale_features: true # Enable scaling for neural networks
    scaling_method: "standard" # standard, minmax, robust
    categorical_encoding: "onehot" # onehot, label, target
    handle_missing: true
    missing_strategy: "mean" # mean, median, constant

  categorical_handling:
    fillna: "Unknown"
    encoding: "onehot" # 👈 Changed from "native" to "onehot" for neural networks

model:
  type: "neuralnetwork"
  task: "regression"
  # 👇 NEW: Model-specific preprocessing hints
  requires_scaling: true
  requires_onehot: true
  params:
    hidden_layer_sizes: [100, 50]
    activation: "relu"
    solver: "adam"
    alpha: 0.0001
    batch_size: "auto"
    learning_rate: "adaptive"
    learning_rate_init: 0.001
    max_iter: 500
    early_stopping: true
    validation_fraction: 0.1
    n_iter_no_change: 10
    verbose: false
  hyperparameter_search:
    enabled: true
    method: "randomized_search"
    n_iter: 10
    scoring: "neg_root_mean_squared_error"
    cv: 3
    n_jobs: -1
    param_distributions:
      hidden_layer_sizes: [[50], [100], [50, 25], [100, 50], [100, 100]]
      activation: ["relu", "tanh"]
      alpha: [0.0001, 0.001, 0.01]
      learning_rate_init: [0.0001, 0.001, 0.01]
      batch_size: [32, 64, 128]
