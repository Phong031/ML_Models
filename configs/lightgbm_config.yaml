# ML_Models/configs/lightgbm_config.yaml
experiment_name: "LightGBM_Experiment"
random_state: 42
val_size: 0.2
cv_folds: 3
track_path: "lightgbm_log.json"
save_path: "lightgbm_model.pkl"

data:
  file_path: "data/Jobs Data.xlsx"
  file_type: "excel"
  columns_needed:
    - "Job Number"
    - "Job Value"
    - "Total Claimed"
    - "Total Cost"
    - "Estimator"
    - "Foreman"
    - "Job Area"
    - "Main Contractor"
    - "Suburb"
    - "Supervisor"
    - "Job Description"
    - "Saving or Loss"
  target_column: "Saving or Loss"
  categorical_features:
    - "Estimator"
    - "Foreman"
    - "Job Area"
    - "Main Contractor"
    - "Suburb"
    - "Supervisor"
    - "Job Description"

feature_engineering:
  operations:
    - name: "temp_profit"
      operation: "subtract"
      inputs: ["Total Claimed", "Total Cost"]
      output: "Temp Profit"

  categorical_handling:
    fillna: "Unknown"
    encoding: "native"

model:
  type: "lightgbm"
  task: "regression"
  params:
    n_estimators: 100
    max_depth: 7
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_samples: 20
    verbosity: -1
  hyperparameter_search:
    enabled: true
    method: "randomized_search"
    n_iter: 10
    scoring: "neg_root_mean_squared_error"
    cv: 3
    n_jobs: -1
    param_distributions:
      n_estimators: [100, 300, 500]
      max_depth: [5, 7, 9, 11]
      learning_rate: [0.01, 0.05, 0.1]
      subsample: [0.6, 0.8, 1.0]
      colsample_bytree: [0.6, 0.8, 1.0]
      min_child_samples: [10, 20, 30]
