# ML_Models/configs/lightgbm_config.yaml
experiment_name: "LightGBM_Experiment"
random_state: 42
val_size: 0.2
cv_folds: 3
track_path: "logs/lightgbm_log.json"
save_path: "models/lightgbm_model.pkl"

data:
  file_path: "data/Jobs Data.xlsx"
  file_type: "excel"
  columns_needed:
    - "Job_Number"
    - "Job_Value"
    - "Total_Claimed"
    - "Total_Cost"
    - "Estimator"
    - "Foreman"
    - "Job_Area"
    - "Main_Contractor"
    - "Suburb"
    - "Supervisor"
    - "Job_Description"
    - "Saving_or_Loss"

      # Columns required for prediction (excludes target)
  feature_columns:
    - "Job_Number"
    - "Job_Value"
    - "Total_Claimed"
    - "Total_Cost"
    - "Estimator"
    - "Foreman"
    - "Job_Area"
    - "Main_Contractor"
    - "Suburb"
    - "Supervisor"
    - "Job_Description"
  target_column: "Saving_or_Loss"
  categorical_features:
    - "Estimator"
    - "Foreman"
    - "Job_Area"
    - "Main_Contractor"
    - "Suburb"
    - "Supervisor"
    - "Job_Description"

feature_engineering:
  operations:
    - name: "temp_profit"
      operation: "subtract"
      inputs: ["Total_Claimed", "Total_Cost"]
      output: "Temp_Profit"

  categorical_handling:
    fillna: "Unknown"
    encoding: "native"

model:
  type: "lightgbm"
  task: "regression"
  params:
    n_estimators: 100
    max_depth: 7
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_samples: 20
    verbosity: -1
  hyperparameter_search:
    enabled: true
    method: "randomized_search"
    n_iter: 10
    scoring: "neg_root_mean_squared_error"
    cv: 3
    n_jobs: -1
    param_distributions:
      n_estimators: [100, 300, 500]
      max_depth: [5, 7, 9, 11]
      learning_rate: [0.01, 0.05, 0.1]
      subsample: [0.6, 0.8, 1.0]
      colsample_bytree: [0.6, 0.8, 1.0]
      min_child_samples: [10, 20, 30]
